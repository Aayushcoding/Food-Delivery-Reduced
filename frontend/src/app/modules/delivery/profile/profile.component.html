<div class="profile-container">
  <div class="profile-header">
    <h2>My Profile</h2>
  </div>

  <!-- Messages -->
  <div *ngIf="successMessage" class="alert alert-success" role="alert">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <!-- Profile Information -->
  <div class="profile-card">
    <div class="profile-info">
      <div class="info-row">
        <label>Username:</label>
        <div *ngIf="!editMode" class="info-value">{{ user?.username }}</div>
        <input 
          *ngIf="editMode" 
          type="text" 
          [(ngModel)]="profileForm.username"
          class="form-control"
          placeholder="Username"
        >
      </div>

      <div class="info-row">
        <label>Email:</label>
        <div class="info-value">{{ user?.email }}</div>
        <span class="email-readonly-note">*Email cannot be changed</span>
      </div>

      <div class="info-row">
        <label>Phone Number:</label>
        <div class="info-value">{{ user?.phoneNo }}</div>
      </div>

      <div class="info-row">
        <label>Role:</label>
        <div class="info-value">
          <span class="role-badge" [ngClass]="'role-' + (user?.role || '').toLowerCase()">
            {{ user?.role }}
          </span>
        </div>
      </div>

      <div class="info-row">
        <label>Address:</label>
        <div *ngIf="!editMode" class="info-value">
          {{ user?.address?.[0]?.street }}, {{ user?.address?.[0]?.city || 'Not set' }}
        </div>
        <input 
          *ngIf="editMode" 
          type="text" 
          [(ngModel)]="profileForm.address"
          class="form-control"
          placeholder="Street, City"
        >
      </div>

      <div class="info-row">
        <label>Member Since:</label>
        <div class="info-value">
          {{ user?.createdAt | date: 'MMM d, yyyy' }}
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="profile-actions">
      <div *ngIf="!editMode" class="action-buttons">
        <button class="btn btn-primary" (click)="enableEdit()">
          <i class="fas fa-edit"></i> Edit Profile
        </button>
        <button class="btn btn-danger" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>

      <div *ngIf="editMode" class="action-buttons">
        <button 
          class="btn btn-success" 
          (click)="saveProfile()"
          [disabled]="loading"
        >
          <span *ngIf="!loading"><i class="fas fa-save"></i> Save Changes</span>
          <span *ngIf="loading"><i class="fas fa-spinner fa-spin"></i> Saving...</span>
        </button>
        <button class="btn btn-secondary" (click)="cancelEdit()">
          <i class="fas fa-times"></i> Cancel
        </button>
      </div>
    </div>
  </div>
</div>
