<div class="main-container">
<div class="container-fluid h-100 p-0">
<div class="row h-100 m-0 g-0">

<!-- LEFT -->
<div class="col-md-6 p-0 left-image">
<div class="overlay">
<h1 class="brand">ByteBites</h1>
<p class="tagline">Crave it. Click it. Get it.</p>
</div>
</div>

<!-- RIGHT -->
<div class="col-md-6 p-0 right-panel d-flex justify-content-center align-items-start pt-5">
<div class="form-card">

<h3 class="mb-4">Create Account</h3>

<form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

<!-- ROLE -->
<div class="mb-3 text-center">
<button type="button" class="role-btn" [class.active]="role==='customer'" (click)="selectRole('customer')">Customer</button>
<button type="button" class="role-btn" [class.active]="role==='owner'" (click)="selectRole('owner')">Restaurant Owner</button>
</div>

<!-- USERNAME -->
<label>Username *</label>
<input type="text" class="form-control custom-input" formControlName="username" placeholder="Enter username">
<div *ngIf="signupForm.get('username')?.dirty && signupForm.get('username')?.invalid">
  <span class="text-danger" *ngIf="signupForm.get('username')?.errors?.['required']">Username is required</span>
</div>

<!-- EMAIL -->
<label class="mt-3">Email *</label>
<input type="email" class="form-control custom-input" formControlName="email" placeholder="Enter email">
<div *ngIf="signupForm.get('email')?.dirty && signupForm.get('email')?.invalid">
  <span class="text-danger" *ngIf="signupForm.get('email')?.errors?.['required']">Email is required</span>
  <span class="text-danger" *ngIf="signupForm.get('email')?.errors?.['email']">Invalid email format</span>
</div>

<!-- PASSWORD -->
<label class="mt-3">Password *</label>
<input type="password" class="form-control custom-input" formControlName="password" placeholder="Enter password (min 6 chars)">
<div *ngIf="signupForm.get('password')?.dirty && signupForm.get('password')?.invalid">
  <span class="text-danger" *ngIf="signupForm.get('password')?.errors?.['required']">Password is required</span>
  <span class="text-danger" *ngIf="signupForm.get('password')?.errors?.['minlength']">Minimum 6 characters</span>
</div>

<!-- CONTACT (optional) -->
<label class="mt-3">Phone (optional)</label>
<input type="text" class="form-control custom-input" formControlName="contact" placeholder="10-digit mobile number">

<!-- ADDRESS (optional) -->
<label class="mt-3">Address (optional)</label>
<input type="text" class="form-control custom-input mb-2" formControlName="street" placeholder="Street">
<input type="text" class="form-control custom-input" formControlName="city" placeholder="City">

<!-- MESSAGES -->
<div *ngIf="errorMessage" class="alert alert-danger mt-2">{{errorMessage}}</div>
<div *ngIf="successMessage" class="alert alert-success mt-2">{{successMessage}}</div>

<!-- BUTTON -->
<button class="btn signup-btn w-100 mt-4" type="submit" [disabled]="isLoading">
  {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
</button>

</form>

<p class="mt-3 text-center">
Already have an account?
<a routerLink="/login">Login</a>
</p>

</div>
</div>

</div>
</div>
</div>
